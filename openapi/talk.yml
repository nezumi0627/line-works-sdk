openapi: 3.1.0
info:
  title: LINE WORKS Talk API
  version: '1.0'
servers:
  - url: 'https://talk.worksmobile.com'
    description: TalkURL
paths:
  /p/contact/v3/domain/contacts/my:
    parameters: []
    get:
      summary: Get My Information
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyInfo'
      operationId: get-my-info
      description: Get your own information.
      parameters:
        - $ref: '#/components/parameters/Cookie'
  /p/oneapp/client/chat/sendMessage:
    post:
      summary: Send Message
      operationId: send-message
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
        description: ''
      parameters:
        - $ref: '#/components/parameters/Cookie'
      description: Send Message.
  /p/oneapp/client/chat/getChannelMembers:
    post:
      summary: Get Channel Members
      operationId: get-channel-members
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetChannelMembersResponse'
      description: Get information about the members in the channel.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetChannelMembersRequest'
      parameters:
        - $ref: '#/components/parameters/Cookie'
    parameters: []
  /p/oneapp/client/chat/quit:
    post:
      summary: Leave Channel
      operationId: leave-channel
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveChannelResponse'
      description: Leave from the channel.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveChannelRequest'
