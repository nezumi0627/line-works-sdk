        content:
          type: string
        type:
          type: integer
      required:
        - channelNo
        - caller
        - type
    SendMessageResponse:
      title: SendMessageResponse
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/SentMessage'
          required:
            - result
    GetChannelMembersRequest:
      title: GetChannelMembersRequest
      type: object
      properties:
        channelNo:
          type: integer
        memberUpdateTime:
          type: integer
          default: 0
        pagingCount:
          type: integer
          default: 500
      required:
        - channelNo
    GetChannelMembersResponse:
      title: GetChannelMembersResponse
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: '#/components/schemas/Member'
          required:
            - members
    LeaveChannelRequest:
      title: LeaveChannelRequest
      type: object
      properties:
        channelNo:
          type: integer
          default: 0
        channelNoList:
          type: array
          items:
            type: integer
      required:
        - channelNoList
    LeaveChannelResponse:
      title: LeaveChannelResponse
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
  responses: {}
  requestBodies: {}
  parameters:
    Cookie:
      name: cookie
      in: header
      required: false
      schema:
